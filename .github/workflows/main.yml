name: Media Autobuild Suite (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Run media-autobuild_suite.bat
        run: |
          echo | .\media-autobuild_suite.bat