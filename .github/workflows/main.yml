name: Media Autobuild Suite (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Run media-autobuild_suite.bat
        run: |
          .\media-autobuild_suite.bat
        env:
          GH_TOKEN: ${{ secrets.TOKEN_REPO }}
